name: Bump Version

on:
  workflow_dispatch:

jobs:
  bump:
    name: Bump Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump versions
        run: pnpm bump

      - name: Push version branch
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BRANCH="changeset-release/v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "Version Packages v${VERSION}"
          git push origin "$BRANCH"

          echo "Branch **${BRANCH}** pushed. Create a PR:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "https://github.com/${{ github.repository }}/compare/main...${BRANCH}" >> "$GITHUB_STEP_SUMMARY"
